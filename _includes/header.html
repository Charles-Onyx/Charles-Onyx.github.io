<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-initial">C</span>
        <span class="logo-text">{{ site.title | escape }}</span>
      </a>
      <nav class="site-nav">
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="nav-toggle-label">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <ul class="nav-menu">
          {% for item in site.nav %}
          <li><a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a></li>
          {% endfor %}
          <li><a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener"><i class="fab fa-github"></i></a></li>
        </ul>
      </nav>
    </div>
  </div>
</header>
