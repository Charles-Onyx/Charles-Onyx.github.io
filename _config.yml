# Site settings
title: "技术博客"
tagline: "Backend Engineering · System Design · AI Integration"
description: >
  专注于 Java/Spring Boot 后端开发、分布式系统设计、高性能架构与 AI 应用集成。
  分享实际项目中的技术实践与深度思考。
author: "Charles-Onyx"
lang: "zh-CN"

# SEO
github_username: Charles-Onyx
url: "https://Charles-Onyx.github.io"
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Permalink
permalink: /:year/:month/:title/

# Plugins - only those supported by GitHub Pages
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Charles-Onyx"

  - scope:
      path: ""
    values:
      layout: "default"

# Navigation
nav:
  - title: "首页"
    url: "/"
  - title: "归档"
    url: "/archive/"
  - title: "关于"
    url: "/about/"
  - title: "项目"
    url: "/projects/"
